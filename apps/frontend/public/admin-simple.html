<!DOCTYPE html>
<html>
<head>
    <title>Mosketh Admin - Simple Version</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .product-form { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .product-card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #667eea; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #5a67d8; }
        .delete-btn { background: #e53e3e; margin-left: 10px; }
        .delete-btn:hover { background: #c53030; }
        img { width: 100%; height: 150px; object-fit: cover; border-radius: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Mosketh Admin Panel</h1>
            <p>Simple version - Add and manage products</p>
        </div>

        <div class="product-form">
            <h2>Add New Product</h2>
            <input type="text" id="name" placeholder="Product Name">
            <input type="number" id="price" placeholder="Price (KES)">
            <select id="category">
                <option value="mens-perfumes">Men's Perfumes</option>
                <option value="womens-perfumes">Women's Perfumes</option>
                <option value="unisex-perfumes">Unisex Perfumes</option>
            </select>
            <textarea id="description" placeholder="Description" rows="3"></textarea>
            <input type="text" id="image" placeholder="Image URL">
            <label>
                <input type="checkbox" id="featured"> Featured Product
            </label>
            <button onclick="addProduct()">Add Product</button>
        </div>

        <div id="products" class="product-grid"></div>
    </div>

    <script>
        // Load products from localStorage
        let products = JSON.parse(localStorage.getItem('mosketh_products') || '[]');
        
        function displayProducts() {
            const container = document.getElementById('products');
            if (products.length === 0) {
                container.innerHTML = '<p>No products added yet.</p>';
                return;
            }
            
            container.innerHTML = products.map(product => `
                <div class="product-card">
                    <img src="${product.image || 'https://via.placeholder.com/300'}" onerror="this.src='https://via.placeholder.com/300'">
                    <h3>${product.name}</h3>
                    <p>KES ${product.price}</p>
                    <p>${product.category.replace('-', ' ')}</p>
                    <p><small>${product.featured ? '⭐ Featured' : ''}</small></p>
                    <button onclick="deleteProduct('${product.id}')" class="delete-btn">Delete</button>
                </div>
            `).join('');
        }

        function addProduct() {
            const product = {
                id: Date.now().toString(),
                name: document.getElementById('name').value,
                price: document.getElementById('price').value,
                category: document.getElementById('category').value,
                description: document.getElementById('description').value,
                image: document.getElementById('image').value,
                featured: document.getElementById('featured').checked
            };
            
            if (!product.name || !product.price) {
                alert('Please fill required fields');
                return;
            }
            
            products.push(product);
            localStorage.setItem('mosketh_products', JSON.stringify(products));
            
            // Clear form
            document.getElementById('name').value = '';
            document.getElementById('price').value = '';
            document.getElementById('description').value = '';
            document.getElementById('image').value = '';
            document.getElementById('featured').checked = false;
            
            displayProducts();
            alert('Product added!');
        }

        function deleteProduct(id) {
            if (confirm('Delete this product?')) {
                products = products.filter(p => p.id !== id);
                localStorage.setItem('mosketh_products', JSON.stringify(products));
                displayProducts();
            }
        }

        displayProducts();
    </script>
</body>
</html>
